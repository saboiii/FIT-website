name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # Tests + coverage thresholds (see vitest.config.mjs) gate the merge.
      - name: Test (with coverage)
        run: yarn test:coverage

      # Lint is reported but does not block while the legacy codebase is cleaned up.
      - name: Lint (non-blocking)
        run: yarn lint
        continue-on-error: true
