name: Newsletter dispatch

# Free scheduler for newsletter campaigns + the welcome drip. Uses the same
# repository secrets as the other crons: CRON_SECRET, CRON_BASE_URL.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger newsletter dispatch endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRON_BASE_URL: ${{ secrets.CRON_BASE_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$CRON_BASE_URL" ]; then
            echo "::error::Missing CRON_SECRET or CRON_BASE_URL repository secret" >&2
            exit 1
          fi
          code=$(curl -sS -o /tmp/news.json -w '%{http_code}' \
            -H "Authorization: Bearer $CRON_SECRET" \
            "${CRON_BASE_URL%/}/api/cron/newsletters")
          echo "HTTP $code"
          cat /tmp/news.json 2>/dev/null || true
          echo
          if [ "$code" -lt 200 ] || [ "$code" -ge 300 ]; then
            echo "::error::Newsletter cron endpoint returned HTTP $code" >&2
            exit 1
          fi
